services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: webmux
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webmux}
      POSTGRES_DB: webmux
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webmux"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: builder
    command: sh -c "npx prisma db push"
    environment:
      DATABASE_URL: postgresql://webmux:${POSTGRES_PASSWORD:-webmux}@db:5432/webmux?schema=public
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    container_name: webmux
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://webmux:${POSTGRES_PASSWORD:-webmux}@db:5432/webmux?schema=public
      COMUX_PASSWORD: ${COMUX_PASSWORD:-}
      COMUX_SECRET: ${COMUX_SECRET:-}
      HOST_HOME: ${HOST_HOME:-/home/devops_bot}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - default
      - wp-proxy

volumes:
  pgdata:

networks:
  wp-proxy:
    external: true
