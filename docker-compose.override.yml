# Local development overrides — auto-loaded by `docker compose up`
services:
  app:
    environment:
      VIRTUAL_HOST: webmux.test
      VIRTUAL_PORT: "3000"
      HOST_HOME: /home/dev
    volumes:
      # Mount host projects directory into container
      - ${HOME:-/Users/audilu}/next:/home/dev/next:rw
      # Share host home for Claude Code config files
      - ${HOME:-/Users/audilu}/.claude:/home/dev/.claude:rw
