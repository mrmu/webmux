# Production overrides (Linux)
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
#
# 架構：
#   - comux (Next.js + WS) 直接跑在宿主機 (systemd) — port 3000
#   - 本檔案只負責 DB + 一個薄的 socat proxy，讓 nginx-proxy / acme-companion
#     能掃到 VIRTUAL_HOST / LETSENCRYPT_HOST 並自動簽憑證
#   - host.docker.internal 需要 extra_hosts (Linux 沒有內建)
services:
  # Expose DB to host (Node 跑在宿主機，透過 localhost:5432 連)
  # 綁 127.0.0.1 只讓本機存取，不對外開放
  db:
    ports:
      - "127.0.0.1:5432:5432"

  # 停用容器版 app
  app:
    profiles: ["disabled"]

  # 停用 migrate (改由 host 端 `npm run db:push` 處理)
  migrate:
    profiles: ["disabled"]

  # 把 nginx-proxy 流量轉到宿主機的 Node process
  #
  # 注意：docker compose v5 在 auto-load .env 時，對值含逗號的變數會在第一個逗號
  # 處截斷（例如 VIRTUAL_HOST=a.com,b.com 會被當成 a.com）。要讓 nginx-proxy
  # 支援多 host（"a.com,b.com" 是 nginx-proxy 官方支援格式），重新 up 前先手動
  # export env：
  #   set -a; . ./.env; set +a
  #   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --force-recreate prod-proxy
  # 或 inline：
  #   VIRTUAL_HOST="a.com,b.com" docker compose ... up -d --force-recreate prod-proxy
  prod-proxy:
    image: alpine/socat
    container_name: comux-proxy
    command: TCP-LISTEN:3000,fork,reuseaddr TCP:host.docker.internal:3000
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST:-comux.audilu.com}
      VIRTUAL_PORT: "3000"
      LETSENCRYPT_HOST: ${VIRTUAL_HOST:-comux.audilu.com}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-audilu@panmedia.asia}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - wp-proxy
      - default
